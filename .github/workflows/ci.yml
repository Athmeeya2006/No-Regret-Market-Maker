name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build C++ engine and run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build extension
        run: python setup.py build_ext --inplace

      - name: Verify C++ binding imports
        run: python -c "import lob_engine; print(lob_engine.MatchingEngine().mid_price())"

      - name: Run tests
        run: pytest tests -q
