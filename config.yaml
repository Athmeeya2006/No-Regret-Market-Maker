simulation:
  n_rounds: 10000
  dt: 1.0
  seed: 42
  tick_size: 0.01
  inventory_penalty: 0.001
  mid_price_vol: 0.001

spread_choices: [0.005, 0.01, 0.02, 0.03, 0.05, 0.08, 0.12, 0.20]

noise_trader:
  arrival_rate: 5.0
  alpha: 1.5
  size_min: 1
  size_max: 50

informed_trader:
  arrival_rate_frac: 0.2
  base_arrival_rate: 5.0
  size_scale: 10

adversarial_trader:
  aggression: 1.0
  tight_threshold: 0.5

avellaneda_stoikov:
  sigma: 0.01
  kappa: 1.5
  gamma: 0.1
  T: 1.0
  dt: 0.001

exp3:
  gamma:
  T: 10000

exp4:
  gamma: 0.1
  T: 10000

sw_exp3:
  window: 200
  gamma: 0.15

regime_generator:
  duration: 2000
  transition: abrupt
  blend_frac: 0.1

regimes:
  - name: calm
    sigma: 0.005
    mu: 0.10
    lambda: 5.0
  - name: volatile
    sigma: 0.020
    mu: 0.30
    lambda: 8.0
  - name: illiquid
    sigma: 0.010
    mu: 0.05
    lambda: 2.0
  - name: informed_heavy
    sigma: 0.015
    mu: 0.50
    lambda: 6.0

experts:
  - type: fixed_spread
    spread: 0.01
  - type: fixed_spread
    spread: 0.05
  - type: volatility
  - type: inventory
  - type: ofi
  - type: depth_imbalance
  - type: avellaneda_stoikov
    sigma: 0.01
    kappa: 1.5
    gamma: 0.1
  - type: momentum
